<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: #F0F4FF; min-height: 100vh; }

        .container { max-width: 760px; margin: 0 auto; padding: 0 24px 60px; }

        /* HERO */
        .hero { text-align: center; padding: 60px 20px 48px; }
        .badge {
            display: inline-block;
            background: #EEF2FF;
            color: #4F46E5;
            border: 1px solid #C7D2FE;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #1E293B;
            line-height: 1.15;
            margin-bottom: 16px;
            letter-spacing: -1.5px;
        }
        .hero h1 span { color: #4F46E5; }
        .hero p {
            color: #64748B;
            font-size: 1rem;
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto;
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            border: 1px solid #E2E8F0;
            margin-bottom: 20px;
        }

        /* UPLOAD */
        .upload-zone {
            border: 2px dashed #C7D2FE;
            border-radius: 14px;
            background: #F8F9FF;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .upload-zone:hover { border-color: #4F46E5; background: #EEF2FF; }
        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .upload-zone .icon { font-size: 2.2rem; margin-bottom: 12px; }
        .upload-zone .title { font-size: 1rem; font-weight: 600; color: #1E293B; margin-bottom: 6px; }
        .upload-zone .hint { color: #94A3B8; font-size: 0.82rem; }
        .upload-zone .selected { color: #4F46E5; font-weight: 600; font-size: 0.9rem; margin-top: 10px; }

        /* BUTTON */
        .btn {
            width: 100%;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 14px rgba(79,70,229,0.3);
            transition: all 0.2s;
        }
        .btn:hover { background: #4338CA; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.45); }
        .btn:disabled { background: #A5B4FC; cursor: not-allowed; transform: none; }

        /* RESULT */
        .result-card { display: none; }
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid #F1F5F9;
            margin-bottom: 24px;
        }
        .result-header .icon { font-size: 1.6rem; }
        .result-header .title { font-size: 1.1rem; font-weight: 700; color: #1E293B; }
        .result-header .sub { font-size: 0.8rem; color: #94A3B8; margin-top: 2px; }
        
        #result-text { color: #334155; font-size: 0.92rem; line-height: 1.75; }
        #result-text h2 {
            color: #4F46E5;
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 6px;
            margin: 22px 0 10px;
        }
        #result-text p { margin-bottom: 8px; }
        #result-text li { margin-bottom: 4px; margin-left: 20px; }
        #result-text strong { color: #1E293B; }

        /* LOADER */
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            color: #64748B;
            font-size: 0.9rem;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #E2E8F0;
            border-top: 3px solid #4F46E5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- HERO -->
        <div class="hero">
            <div class="badge">✦ AI Powered</div>
            <h1>Resume <span>Analyzer</span> Pro</h1>
            <p>Analyze resumes instantly with detailed professional insights, structured evaluation, and actionable recommendations.</p>
        </div>

        <!-- UPLOAD CARD -->
        <div class="card">
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept=".pdf">
                <div class="icon">📎</div>
                <div class="title">Drop your PDF resume here</div>
                <div class="hint">PDF only &nbsp;•&nbsp; Max 10MB</div>
                <div class="selected" id="fileName"></div>
            </div>
            <button class="btn" id="analyzeBtn" onclick="analyzeResume()">
                Analyze Resume →
            </button>
        </div>

        <!-- LOADER -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            AI is analyzing your resume...
        </div>

        <!-- RESULT CARD -->
        <div class="card result-card" id="resultCard">
            <div class="result-header">
                <span class="icon">📊</span>
                <div>
                    <div class="title">Resume Analysis Report</div>
                    <div class="sub">AI-generated professional evaluation</div>
                </div>
            </div>
            <div id="result-text"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');

        fileInput.addEventListener('change', function() {
            if (this.files[0]) {
                fileName.textContent = '✅ ' + this.files[0].name;
            }
        });

        async function analyzeResume() {
            const file = fileInput.files[0];
            if (!file) {
                alert('Please upload a PDF resume first!');
                return;
            }

            const btn = document.getElementById('analyzeBtn');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const resultText = document.getElementById('result-text');

            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            loader.style.display = 'block';
            resultCard.style.display = 'none';

            const formData = new FormData();
            formData.append('resume', file);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                loader.style.display = 'none';
                resultCard.style.display = 'block';
                resultText.innerHTML = marked.parse(data.result);
                
                resultCard.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                loader.style.display = 'none';
                alert('Error analyzing resume. Please try again.');
            }

            btn.disabled = false;
            btn.textContent = 'Analyze Resume →';
        }
    </script>
</body>
</html>
